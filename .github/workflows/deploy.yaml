name: CI/CD pipeline

on:
  push:
    branches: ["main"]

env:
  DB_URI: ${{ secrets.DB_URI }}
  PORT: ${{ secrets.PORT }}
  ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
  REFRESH_TOKEN_SECRET: ${{ secrets.REFRESH_TOKEN_SECRET }}
  ACCESS_TOKEN_EXPIRES_IN: ${{ secrets.ACCESS_TOKEN_EXPIRES_IN }}
  REFRESH_TOKEN_EXPIRES_IN: ${{ secrets.REFRESH_TOKEN_EXPIRES_IN }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/server:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/server:${{ github.sha }}
      
      - name: Deploy to AWS EC2 Instances
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_SSH_PORT }}
          script: |
            echo "Pulling image..."
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/server:latest

            echo "Stopping and removing old container..."
            docker stop server || true
            docker rm server || true

            echo "Running new container..."
            docker run -d --name server \
              -p 80:${{ secrets.PORT }} \
              -e DB_URI=${{ secrets.DB_URI }} \
              -e PORT=${{ secrets.PORT }} \
              -e ACCESS_TOKEN_SECRET=${{ secrets.ACCESS_TOKEN_SECRET }} \
              -e REFRESH_TOKEN_SECRET=${{ secrets.REFRESH_TOKEN_SECRET }} \
              -e ACCESS_TOKEN_EXPIRES_IN=${{ secrets.ACCESS_TOKEN_EXPIRES_IN }} \
              -e REFRESH_TOKEN_EXPIRES_IN=${{ secrets.REFRESH_TOKEN_EXPIRES_IN }} \
              ${{ secrets.DOCKERHUB_USERNAME }}/server:latest

            echo "Done!"