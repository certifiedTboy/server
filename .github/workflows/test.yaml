name: CI/CD pipeline dev branch test

on:
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened]

env:
  DB_URI: ${{ secrets.TEST_DB_URI }}
  PORT: ${{ secrets.PORT }}
  ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
  REFRESH_TOKEN_SECRET: ${{ secrets.REFRESH_TOKEN_SECRET }}
  ACCESS_TOKEN_EXPIRES_IN: ${{ secrets.ACCESS_TOKEN_EXPIRES_IN }}
  REFRESH_TOKEN_EXPIRES_IN: ${{ secrets.REFRESH_TOKEN_EXPIRES_IN }}

jobs:
  build:
    if: github.head_ref == 'dev'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: npm install && npm run test:ci
